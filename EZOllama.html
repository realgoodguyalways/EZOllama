<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="EZOllama.css">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
        <style>
            html, body {
                height: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }
            body {
                display: flex;
                flex-direction: column;
                background-color: #4f4f4f;
            }
            .input {
                height: 60px;
                display: flex;
            }
            .chat {
                position: flex;
                flex: 1;
                overflow-y: auto;
                padding: 30px;
            }
        </style>
    </head>
    <body>
        <div class="chat" id="chat">
            <div id="response" style=" max-width: 100%; word-wrap: break-word; word-break: keep-all; margin-left: 0%; display: inline-block; padding-left: 10px; padding-right: 10px; border-radius: 15px;">Answer will appear here</div>
            <div id="loading" style=" opacity: 0; margin: 30px; margin-left: 10px;">Loading...</div>
        </div>
        <div class="input">
            <input type="text" id="prompt" placeholder="Type something..." 
            style="flex-grow: 1; width: calc(100% - 80px); height: 40px; border-radius: 15px; margin-left: 10px; position: fixed; bottom: 10px; border-color: black;"/>
            <button id="submit" style=" position: fixed; bottom: 10px; right: 10px; height: 45px; width: 45px; border-radius: 25px; border-color: black; background-color: #5b5375;">Send</button>
        </div>

        <script>
            var prompts = [];

            document.getElementById('submit').addEventListener('click', function() {
                var question = document.getElementById('prompt').value;
                if (!question) {
                    return;
                }

                document.getElementById('submit').disabled = true;

                prompts.push({ role: 'user', content: question });
                document.getElementById('prompt').value = '';
                display();

                fetch('http://127.0.0.1:11434/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        model: 'tinyllama:latest',
                        messages: prompts,
                        stream: false,
                    }),
                })
                .then(function(res) {return res.json(); })
                .then(function(data) {
                    prompts.push({ role: 'assistant', content: data.message.content });
                    display();
                    document.getElementById('submit').disabled = false;
                })
                function display() {
                    var html = '';
                    for (var i =0; i < prompts.length; i++) {
                        var who = prompts[i].role === 'user' ? 'You' : 'AI';
                        if (who === 'You') {
                            document.getElementById('response').style.backgroundColor = '#5b5375';
                            document.getElementById('loading').style.opacity = 1;
                        } else {
                            document.getElementById('loading').style.opacity = 0;
                        }
                        html += '<p><b>' + who + ':</b> ' + prompts[i].content + '</p>';
                    }
                    document.getElementById('response').innerHTML = html;

                    var chatDiv = document.querySelector('.chat');
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            })
        </script>
    </body>
</html>
