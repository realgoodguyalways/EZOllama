<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="EZOllama.css">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
        <style>
            html, body {
                height: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }
            body {
                display: flex;
                flex-direction: column;
                background-color: #4f4f4f;
            }
            .input {
                flex: 1;
                display: flex;
            }
            .chat {
                padding: 195px;
            }
        </style>
    </head>
    <body>
        <div class="chat">
            <p id="response" style="word-break: keep-all; margin-left: 0%;">Answer will appear here</p>
        </div>
        <div class="input">
            <input type="text" id="prompt" placeholder="Type something..." 
            style="flex-grow: 1; width: calc(100% - 80px); height: 40px; border-radius: 15px; margin-left: 10px; position: fixed; bottom: 10px; border-color: black;"/>
            <button id="submit" style=" position: fixed; bottom: 10px; right: 10px; height: 45px; width: 45px; border-radius: 25px; border-color: black; background-color: #5b5375;">Send</button>
        </div>

        <script>
            document.getElementById('submit').addEventListener('click', function() {
                document.getElementById('response').innerText = "Loading...";
                document.getElementById('prompt').value = '';

                fetch('http://127.0.0.1:11434/api/generate', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        model: 'tinyllama:latest',
                        prompt: document.getElementById('prompt').value,
                        stream: false
                    })
                })
                .then(function(res) {return res.json(); })
                .then(function(data) {
                    document.getElementById('reponse').innerText = data.response;
                })
            })
        </script>
    </body>
</html>
